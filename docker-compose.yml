services:
  postgres:
    image: postgres
    restart: always
    networks:
      - rwp-net
    volumes:
      - ./db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: DB_Admin!7890
      POSTGRES_DB: rwp
    ports:
      - "7890:5432"
  pgadmin:  
    image: dpage/pgadmin4
    restart: always
    networks:
      - rwp-net
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rwp.com
      PGADMIN_DEFAULT_PASSWORD: RWP_Admin!5050
    ports:
      - "5050:80"
  rwp:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: rwp-container
    working_dir: /var/www/html/
    networks: 
      - rwp-net
    depends_on:
      - postgres
    ports:
      - "8081:80"

networks:
  rwp-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "127.0.0.1"


volumes:
  db_data: